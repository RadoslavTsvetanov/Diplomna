name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun --cwd utils/env-manager/env run lint

      - name: Run TypeScript build check
        run: bun --cwd utils/env-manager/env run build

      - name: Run unit tests
        run: bun --cwd utils/env-manager/env run test:ci
